# agentsCluster 示例配置
# 真正使用时请复制为 config/agents.yaml

settings:
  cluster_root: D:\programs\agentsCluster
  runs_dir: runs
  worktrees_dir: worktrees
  patches_dir: patches
  default_timeout_seconds: 1800
  max_rework_rounds: 1
  orchestrator: langgraph
  integration_strategy: adapter

agents:
  master:
    runner: codex
    model: gpt-5.5
    role: orchestrator
    timeout_seconds: 1800
    preferred_skills: [bulletproof, github]
    preferred_mcp: [context-mode, letta]
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
    codex:
      sandbox: workspace-write
      approval_policy: never
      model_reasoning_effort: xhigh

  reviewer:
    runner: codex
    model: gpt-5.5
    role: reviewer
    timeout_seconds: 1800
    preferred_skills: [github]
    preferred_mcp: [context-mode]
    env:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
    codex:
      sandbox: workspace-write
      approval_policy: never
      model_reasoning_effort: xhigh

  architect:
    runner: claude
    model: deepseek-v4-flash
    role: architect
    timeout_seconds: 1800
    preferred_skills: [bulletproof]
    preferred_mcp: [context-mode]
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
    claude:
      output_format: text
      permission_mode: acceptEdits

  coder:
    runner: claude
    model: deepseek-v4-flash
    role: coder
    timeout_seconds: 1800
    preferred_skills: [bulletproof]
    preferred_mcp: [context-mode]
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
    claude:
      output_format: text
      permission_mode: acceptEdits

  tester:
    runner: claude
    model: deepseek-v4-flash
    role: tester
    timeout_seconds: 1800
    preferred_skills: [bulletproof]
    preferred_mcp: [context-mode]
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
    claude:
      output_format: text
      permission_mode: acceptEdits

  cheap_worker:
    runner: direct_llm
    provider: deepseek
    model: deepseek-chat
    role: assistant
    timeout_seconds: 300
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    direct_llm:
      base_url: https://api.deepseek.com
      api_key_env: DEEPSEEK_API_KEY

  aider_coder:
    runner: aider
    model: deepseek/deepseek-chat
    role: coder
    timeout_seconds: 1800
    enabled: false
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    aider:
      # 如果你使用 `agentsCluster tools install aider` 安装到本仓库，可直接指定绝对路径：
      # command: D:\programs\agentsCluster\vendor\tools\aider\.venv\Scripts\aider.exe
      extra_args: []

  openhands_coder:
    runner: openhands
    model: deepseek-v4-flash
    role: coder
    timeout_seconds: 1800
    enabled: false
    env:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    openhands:
      command: openhands
      workspace_arg: true
      extra_args: []

projects: []
